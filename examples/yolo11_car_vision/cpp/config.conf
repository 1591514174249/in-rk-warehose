# ==========================================
# 车辆检测系统配置文件
# ==========================================

# --- 显示设置 ---
width=720
height=480

# --- 模型设置 ---
# 模型输入尺寸 (正方形)
model_input_size=640
# 模型路径
model_path=./model/yolo11.rknn


# --- AI 检测阈值 ---
# 高置信度阈值 (高于此值视为确定目标)
high_threshold=0.55
# 低置信度阈值 (低于此值但在 match_iou 内的会被尝试匹配)
low_threshold=0.10

# --- 追踪与滤波 ---
# IoU 匹配阈值 (重叠度大于此值视为同一物体)
match_iou_threshold=0.25
# 速度滤波系数 (越小越平滑，越大越灵敏，范围 0.0 ~ 1.0)
velocity_alpha=0.3

# --- 计数区域设置 ---
# 计数线中心位置 (屏幕高度的百分比, 0.60 代表中下部)
count_line_center_pct=0.60
# 缓冲区宽度 (像素，线上下各延伸这么多)
zone_buffer=40
# ROI 区域 (只检测屏幕宽度百分比范围内的物体)
roi_x_min_pct=0.30
roi_x_max_pct=0.70
